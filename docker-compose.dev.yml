services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: hefesto-backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    command: pnpm dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: hefesto-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: pnpm dev --host 0.0.0.0
    environment:
      - VITE_API_URL=http://localhost:3000

  mongo:
    image: mongo:7
    container_name: hefesto-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express
    container_name: hefesto-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongo

volumes:
  mongo-data:
